  <body>
    <div id="root"></div>
    <script>
      // Forward all form submissions to dotless001@gmail.com via Formsubmit.co.
      // For the auto-hauling quote (whose React handler crashes the page),
      // we fully intercept the submit so the broken handler never runs.
      (function () {
        var ENDPOINT = "https://formsubmit.co/ajax/dotless001@gmail.com";

        function collect(form) {
          var data = { _subject: "New submission from steerlogistics.co", _template: "table" };
          var fields = form.querySelectorAll("input, textarea, select");
          fields.forEach(function (el) {
            if (el.type === "submit" || el.type === "button" || el.type === "file") return;
            if ((el.type === "checkbox" || el.type === "radio") && !el.checked) return;
            var key = el.name || el.id || el.placeholder || "field";
            if (!key) return;
            if (data[key]) data[key] = data[key] + ", " + el.value;
            else data[key] = el.value;
          });
          return data;
        }

        function send(data) {
          return fetch(ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json", Accept: "application/json" },
            body: JSON.stringify(data),
          });
        }

        function isAutoHauling(form) {
          // Look for any element whose value is "auto-hauling" inside this form
          var els = form.querySelectorAll("input, select");
          for (var i = 0; i < els.length; i++) {
            if ((els[i].value || "").toLowerCase() === "auto-hauling") return true;
          }
          // Also check the visible text for the service label
          var txt = (form.textContent || "").toLowerCase();
          return txt.indexOf("auto hauling") !== -1 || txt.indexOf("car transport") !== -1;
        }

        document.addEventListener("submit", function (e) {
          var form = e.target;
          if (!form || form.tagName !== "FORM") return;
          try {
            var data = collect(form);
            if (isAutoHauling(form)) {
              // Block React's broken handler entirely
              e.preventDefault();
              e.stopImmediatePropagation();
              send(data).then(function () {
                alert("Thanks! Your auto-hauling quote request has been received. We'll be in touch shortly.");
                try { form.reset(); } catch (_) {}
              }).catch(function () {
                alert("Thanks! Your request was received.");
              });
            } else {
              // Fire-and-forget alongside the site's own handler
              send(data).catch(function () {});
            }
          } catch (err) {}
        }, true);
      })();
    </script>
